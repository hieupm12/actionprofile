name: Build WorkFlow
on: 
  push: 
    branches:
      - main

  pull_request: 
    branches:
      - main 
  
  workflow_dispatch:

  schedule:
    - cron: "30 13 * * 1-5"
permissions:
  contents: read

jobs: 
  Build: 
    runs-on: ubuntu-latest
    steps: 
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Maven Build
        run: mvn install

      - name: Upload Build Artifact (WAR)
        uses: actions/upload-artifact@v4
        with:
          name: vprofile-app
          path: target/*.war

      - name: Notify if Build Fails
        if: failure()
        run: echo "Build job failed! Please check logs."

  Testing:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run tests on main branch
        if: github.ref == 'refs/heads/main'
        run: mvn test

      - name: Checkstyle
        if: github.ref == 'refs/heads/main'
        run: mvn checkstyle:checkstyle

      - name: Run tests on other branches
        if: github.ref != 'refs/heads/main'
        run: echo "Skipping unit tests and code analysis"

  Security_Scan:
    runs-on: ubuntu-latest
    needs: Build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      
      # - name: Run Trivy vulnerability scanner
      #   uses: aquasecurity/trivy-action@0.33.1
      #   with:
      #     scan-type: fs
      #     scan-ref: .
      #     format: json
      #     exit-code: 0
      #     vuln-type: os,library
      #     output: trivy_result.json

      # - name: Upload Trivy scan results as artifact
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: trivy-scan-results
      #     path: trivy_result.json
      - name: Download Trivy HTML Template
        run: wget https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl -O html.tpl

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'template'       # Chọn định dạng template
          template: 'html.tpl'     # Trỏ vào file vừa tải ở trên (không dùng @/contrib...)
          output: 'trivy-report.html'
          severity: 'CRITICAL,HIGH'
          exit-code: 0             # QUAN TRỌNG: Bắt buộc để 0 để không bị lỗi workflow dù có tìm ra lỗ hổng
          ignore-unfixed: true     # Gợi ý: Bỏ qua các lỗi chưa có bản vá (đỡ tốn công xem)

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        with:
          name: trivy-html-report
          path: trivy-report.html

