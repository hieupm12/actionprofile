  Security_Scan:
    runs-on: ubuntu-latest
    needs: Build  # Chờ Job Build xong để lấy file Artifact
    steps:
      # 1. Tải file Artifact (.war) từ Job Build về máy này
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: vprofile-app  # Tên này phải TRÙNG KHỚP với tên lúc bạn upload ở Job Build
          path: .             # Tải về thư mục hiện tại

      # 2. Cài đặt công cụ Trivy (Dạng Binary - Không dùng Container)
      - name: Install Trivy Tool
        uses: aquasecurity/setup-trivy@v0.2.2
        with:
          cache: true
          version: v0.58.2

      # 3. Tải file giao diện báo cáo (HTML Template)
      - name: Download Report Template
        run: curl -sL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/html.tpl > html.tpl

      # 4. Quét trực tiếp file .WAR (hoặc .JAR)
      - name: Scan Artifact (.war file)
        run: |
          # Tìm file có đuôi .war trong thư mục hiện tại
          trivy fs *.war \
            --format template \
            --template "@html.tpl" \
            --output trivy-artifact-report.html \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --scanners vuln  # Chỉ quét lỗ hổng thư viện (Vuln), bỏ qua cấu hình (Misconfig)

      # 5. Upload kết quả báo cáo
      - name: Upload Scan Report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: trivy-artifact-report.html